naftiko: 1.0.0-alpha2
info:
  label: dLocal Payments API — Payments
  description: dLocal Payments API capability covering payment creation, retrieval, status,
    and cancellation across 60+ emerging-market countries. Self-contained Naftiko capability.
  tags:
  - dLocal
  - Payments
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    DLOCAL_LOGIN: DLOCAL_LOGIN
    DLOCAL_TRANS_KEY: DLOCAL_TRANS_KEY
    DLOCAL_SECRET: DLOCAL_SECRET
capability:
  consumes:
  - type: http
    namespace: payments-payments
    baseUri: https://api.dlocal.com
    description: dLocal Payments (Payins) business capability.
    resources:
    - name: payments
      path: /payments
      operations:
      - name: createpayment
        method: POST
        description: dLocal Create A Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
      - name: searchpaymentmethods
        method: GET
        path: /payment-methods
        description: dLocal Search Payment Methods
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: country
          in: query
          type: string
          required: true
    - name: payment-by-id
      path: /payments/{payment_id}
      operations:
      - name: retrievepayment
        method: GET
        description: dLocal Retrieve A Payment
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: payment_id
          in: path
          type: string
          required: true
      - name: retrievepaymentstatus
        method: GET
        path: /payments/{payment_id}/status
        description: dLocal Retrieve A Payment Status
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: payment_id
          in: path
          type: string
          required: true
      - name: cancelpayment
        method: POST
        path: /payments/{payment_id}/cancel
        description: dLocal Cancel An Alternative Payment
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: payment_id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-Trans-Key
      value: '{{env.DLOCAL_TRANS_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payments-payments-rest
    port: 8080
    description: REST adapter for dLocal Payments.
    resources:
    - path: /v1/payments
      name: payments
      description: REST surface for payments.
      operations:
      - method: POST
        name: createpayment
        description: dLocal Create A Payment
        call: payments-payments.createpayment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: searchpaymentmethods
        path: /v1/payment-methods
        description: dLocal Search Payment Methods
        call: payments-payments.searchpaymentmethods
        with:
          country: rest.query.country
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: retrievepayment
        path: /v1/payments/{payment_id}
        description: dLocal Retrieve A Payment
        call: payments-payments.retrievepayment
        with:
          payment_id: rest.path.payment_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-payments-mcp
    port: 9090
    transport: http
    description: MCP adapter for dLocal Payments.
    tools:
    - name: dlocal-create-payment
      description: dLocal Create A Payment
      hints: { readOnly: false, destructive: false, idempotent: false }
      call: payments-payments.createpayment
      with: { body: tools.body }
      outputParameters:
      - type: object
        mapping: $.
    - name: dlocal-retrieve-payment
      description: dLocal Retrieve A Payment
      hints: { readOnly: true, destructive: false, idempotent: true }
      call: payments-payments.retrievepayment
      with: { payment_id: tools.payment_id }
      outputParameters:
      - type: object
        mapping: $.
    - name: dlocal-search-payment-methods
      description: dLocal Search Payment Methods
      hints: { readOnly: true, destructive: false, idempotent: true }
      call: payments-payments.searchpaymentmethods
      with: { country: tools.country }
      outputParameters:
      - type: object
        mapping: $.
