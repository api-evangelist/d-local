naftiko: 1.0.0-alpha2
info:
  label: dLocal Cards API — Cards
  description: dLocal Cards capability — tokenize, retrieve, and delete saved cards.
  tags:
  - dLocal
  - Cards
  - Tokenization
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    DLOCAL_LOGIN: DLOCAL_LOGIN
    DLOCAL_TRANS_KEY: DLOCAL_TRANS_KEY
    DLOCAL_SECRET: DLOCAL_SECRET
capability:
  consumes:
  - type: http
    namespace: cards-cards
    baseUri: https://api.dlocal.com
    description: dLocal Cards business capability.
    resources:
    - name: secure-cards
      path: /secure_cards
      operations:
      - name: createcard
        method: POST
        description: dLocal Create A Card
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: secure-card-by-id
      path: /secure_cards/{card_id}
      operations:
      - name: retrievecard
        method: GET
        description: dLocal Retrieve A Card
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: card_id
          in: path
          type: string
          required: true
      - name: deletecard
        method: DELETE
        description: dLocal Delete A Card
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: card_id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-Trans-Key
      value: '{{env.DLOCAL_TRANS_KEY}}'
      placement: header
  exposes:
  - type: mcp
    namespace: cards-cards-mcp
    port: 9090
    transport: http
    description: MCP adapter for dLocal Cards.
    tools:
    - name: dlocal-create-card
      description: dLocal Create A Card
      hints: { readOnly: false, destructive: false, idempotent: false }
      call: cards-cards.createcard
      with: { body: tools.body }
      outputParameters:
      - type: object
        mapping: $.
    - name: dlocal-retrieve-card
      description: dLocal Retrieve A Card
      hints: { readOnly: true, destructive: false, idempotent: true }
      call: cards-cards.retrievecard
      with: { card_id: tools.card_id }
      outputParameters:
      - type: object
        mapping: $.
    - name: dlocal-delete-card
      description: dLocal Delete A Card
      hints: { readOnly: false, destructive: true, idempotent: true }
      call: cards-cards.deletecard
      with: { card_id: tools.card_id }
      outputParameters:
      - type: object
        mapping: $.
